spring:
  application:
    name: AI_ChatBot
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_chatbot
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  # A4: HS256 — 운영에서는 반드시 JWT_SECRET 환경변수 주입 (32바이트 이상)
  secret: ${JWT_SECRET:local-dev-only-secret-key-minimum-32-bytes!!}

admin:
  # A2: 시드 관리자 비밀번호 — 운영에서는 ADMIN_PASSWORD 환경변수 주입
  password: ${ADMIN_PASSWORD:admin12345}