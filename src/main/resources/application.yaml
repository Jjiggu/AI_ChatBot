spring:
  application:
    name: AI_ChatBot
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_chatbot
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  # A4: HS256 — JWT_SECRET 환경변수 필수 (32바이트 이상), 미설정 시 기동 실패
  secret: ${JWT_SECRET}

admin:
  # A2: 시드 관리자 비밀번호 — ADMIN_PASSWORD 환경변수 필수
  password: ${ADMIN_PASSWORD}

openai:
  # A1: OPENAI_API_KEY 환경변수 필수
  api-key: ${OPENAI_API_KEY}